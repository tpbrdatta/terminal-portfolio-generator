name: Handle Form Submission and Deploy

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  build-portfolio:
    if: contains(github.event.issue.labels.*.name, 'portfolio-builder')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Extracts the issue form markdown content safely into the runtime environment variable
      - name: Process Form and Build Site
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python build.py

      # Automatically updates the files in the user's repository safely
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force git to track index.html specifically
          git add index.html
          
          # Commit only if index.html actually changed, preventing exit code crashes
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit. Proceeding to deployment."
          else
            git commit -m "docs: user profile updated via Issue Form Submission"
            git push origin HEAD
          fi

      # Bundles the folder structure up for deployment
      - name: Upload Deployment Target
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Publishes the static terminal portfolio code live on the web
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # Clean up the issue tracker dashboard by commenting and closing out the ticket
      - name: Close Form Issue Process Reference
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🚀 **Success!** Your terminal portfolio has been generated and deployed cleanly to your GitHub Pages domain. This issue tracker is closing out now."
          gh issue close ${{ github.event.issue.number }} --reason "completed"