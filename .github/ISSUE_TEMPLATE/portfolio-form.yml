name: "🚀 Create/Update My Portfolio"
description: "Fill out this form to generate your terminal portfolio website instantly."
title: "[Portfolio Setup]: Update Profile"
labels: ["profile-setup"]
body:
  - type: markdown
    attributes:
      value: |
        ### Welcome to the Profile Generator!
        Please fill out the sections below. Required sections must be filled. Optional cards will be automatically hidden from your website if you leave them blank.

  - type: input
    id: name
    attributes:
      label: "Full Name"
      placeholder: "e.g., Your Name"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: "Job Title / Core Focus"
      placeholder: "e.g., Computer Science Student / Backend Engineer"
    validations:
      required: true

  - type: input
    id: current_status
    attributes:
      label: "Status Text"
      placeholder: "e.g., nth Year CS Student at Tech University"
    validations:
      required: true

  - type: textarea
    id: bio
    attributes:
      label: "Biography"
      placeholder: "Write a detailed summary about who you are, what you enjoy building, and your philosophy."
    validations:
      required: true

  - type: textarea
    id: current_activity
    attributes:
      label: "Current Activity"
      placeholder: "e.g., Finishing my degree, optimizing open-source database scripts, and learning systems programming."
    validations:
      required: true

  - type: dropdown
    id: accent_color
    attributes:
      label: "Accent Color"
      description: "Select the primary accent color vibe for your terminal layout."
      options:
        - "Classic Gold (#D4A24C)"
        - "Matrix Green (#4CAE7F)"
        - "Cyber Blue (#3B82F6)"
        - "Cyberpunk Pink (#EC4899)"
        - "Deep Purple (#A855F7)"
    validations:
      required: true

  - type: input
    id: github_username
    attributes:
      label: "GitHub Username"
    validations:
      required: true

  - type: input
    id: leetcode_username
    attributes:
      label: "LeetCode Username"
      placeholder: "Shown as a link in the Contact section. Leave blank to hide it."
    validations:
      required: false

  - type: input
    id: contact_email
    attributes:
      label: "Contact Email"
      placeholder: "e.g., hello@example.com"
    validations:
      required: false

  - type: textarea
    id: social_links
    attributes:
      label: "Social Links"
      description: "One line per platform you selected above, formatted exactly as 'Platform: value'. Use just your username for most platforms (e.g. 'X: johnsmith'); use the full URL for Website (e.g. 'Website: https://example.com')."
      placeholder: |
        LinkedIn: your-handle
        X: your-handle
        Instagram: your-handle
    validations:
      required: false

  - type: input
    id: tech_stack
    attributes:
      label: "Tech Stack"
      placeholder: "Python, SQL, C, Linux, Git, Docker, VS Code"
    validations:
      required: true

  - type: textarea
    id: quiz_data
    attributes:
      label: "Quiz Data"
      description: "Follow the syntax exactly. Use 'Q:' for the question, 'A:' for the single correct answer, and 'X:' for three wrong answers separated by commas."
      value: |
        Q: What is my absolute favorite coding language?
        A: Python
        X: JavaScript, C++, Assembly
        ---
        Q: What time of day do I usually commit code?
        A: 3:00 AM (Night Owl)
        X: 6:00 AM (Early Riser), 12:00 PM (Lunch Break), 9:00 AM sharp
        ---
        Q: What is my preferred workspace setup element?
        A: Massive water bottle
        X: Mechanical keyboard collection, RGB strip light overload, Dual vertical monitors
    validations:
      required: true